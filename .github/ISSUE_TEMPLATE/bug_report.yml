name: Bug Report
description: Create a report to help us improve httpx.zig
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting an issue.

        Please confirm this is reproducible on the latest `main` branch and with Zig `0.15.2`.
        Relevant docs: https://muhammad-fiaz.github.io/httpx.zig/

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "I tried to request X but got Y error..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Initialize client...
        2. Make request to...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
      placeholder: "The request should succeed and return status 200..."
    validations:
      required: true

  - type: input
    id: zig-version
    attributes:
      label: Zig Version
      description: What version of Zig are you using? (zig version)
      placeholder: 0.15.2
    validations:
      required: true

  - type: input
    id: httpx-version
    attributes:
      label: httpx.zig Version
      description: What version of httpx.zig are you using? (e.g. 0.0.2, main branch commit)
      placeholder: 0.0.2
    validations:
      required: true

  - type: input
    id: target
    attributes:
      label: Build Target
      description: Target triple used in build/test (if any).
      placeholder: x86_64-linux
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - Linux
        - macOS
        - Other
    validations:
      required: true

  - type: textarea
    id: minimal-code
    attributes:
      label: Minimal Reproduction Code
      description: Paste the smallest code sample that reproduces the issue.
      render: zig
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Paste any relevant logs or attach screenshots.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I tested with Zig 0.15.2.
          required: true
        - label: I searched existing issues before creating this report.
          required: true
